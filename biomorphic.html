<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>Biomorphic Flow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    svg {
      width: 100vw;
      height: 56.25vw;
      max-height: 100vh;
      max-width: 177.78vh;
    }

    /* Flowing wave animations */
    .flow-primary {
      animation: waveDrift 12s ease-in-out infinite;
      transform-origin: center;
    }
    .flow-secondary {
      animation: waveDrift 15s ease-in-out infinite reverse;
      transform-origin: center;
    }

    @keyframes waveDrift {
      0%, 100% { transform: translateY(0) translateX(0); }
      25% { transform: translateY(-15px) translateX(10px); }
      50% { transform: translateY(5px) translateX(-8px); }
      75% { transform: translateY(-8px) translateX(12px); }
    }

    /* Breathing blob animations */
    .blob {
      animation: breathe 8s ease-in-out infinite;
      transform-origin: center;
    }
    .blob-2 {
      animation: breathe 10s ease-in-out infinite;
      animation-delay: -3s;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1) rotate(0deg); }
      30% { transform: scale(1.08) rotate(2deg); }
      60% { transform: scale(0.95) rotate(-1deg); }
    }

    /* Tendril sway */
    .tendril {
      animation: sway 7s ease-in-out infinite;
      transform-origin: top center;
    }
    .tendril-2 {
      animation: sway 9s ease-in-out infinite reverse;
      transform-origin: top center;
    }

    @keyframes sway {
      0%, 100% { transform: rotate(0deg) translateX(0); }
      33% { transform: rotate(3deg) translateX(15px); }
      66% { transform: rotate(-2deg) translateX(-10px); }
    }

    /* Root growth pulse */
    .roots {
      animation: rootPulse 6s ease-in-out infinite;
    }
    .roots-2 {
      animation: rootPulse 8s ease-in-out infinite;
      animation-delay: -2s;
    }

    @keyframes rootPulse {
      0%, 100% { stroke-width: 5; opacity: 0.8; }
      50% { stroke-width: 6; opacity: 1; }
    }

    /* Vein pulse */
    .vein {
      animation: veinFlow 4s ease-in-out infinite;
    }

    @keyframes veinFlow {
      0%, 100% { stroke-dashoffset: 0; opacity: 0.6; }
      50% { stroke-dashoffset: 50; opacity: 0.9; }
    }

    /* Floating particles */
    .particle {
      animation: float 10s ease-in-out infinite;
    }
    .particle-1 { animation-delay: 0s; }
    .particle-2 { animation-delay: -2s; }
    .particle-3 { animation-delay: -4s; }
    .particle-4 { animation-delay: -6s; }
    .particle-5 { animation-delay: -8s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
      25% { transform: translateY(-20px) rotate(5deg); opacity: 0.9; }
      50% { transform: translateY(-5px) rotate(-3deg); opacity: 0.6; }
      75% { transform: translateY(-15px) rotate(2deg); opacity: 0.85; }
    }

    /* Mycelium shimmer */
    .mycelium {
      animation: shimmer 5s ease-in-out infinite;
    }
    .mycelium-2 {
      animation: shimmer 6s ease-in-out infinite;
      animation-delay: -2.5s;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.3; stroke-width: 1.5; }
      50% { opacity: 0.7; stroke-width: 2; }
    }

    /* Cellular morph */
    .cell {
      animation: morph 12s ease-in-out infinite;
      transform-origin: center;
    }
    .cell-2 {
      animation: morph 14s ease-in-out infinite;
      animation-delay: -5s;
    }

    @keyframes morph {
      0%, 100% { transform: scale(1) skewX(0deg); }
      25% { transform: scale(1.05) skewX(2deg); }
      50% { transform: scale(0.97) skewX(-1deg); }
      75% { transform: scale(1.03) skewX(1deg); }
    }

    /* Sweep drift */
    .sweep {
      animation: sweepMove 20s linear infinite;
    }
    .sweep-top {
      animation: sweepMove 25s linear infinite reverse;
    }

    @keyframes sweepMove {
      0% { transform: translateX(-30px); }
      100% { transform: translateX(30px); }
    }

    /* Background subtle pulse */
    .bg-pulse {
      animation: bgPulse 8s ease-in-out infinite;
    }

    @keyframes bgPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.92; }
    }

    /* Grain flicker */
    .grain {
      animation: grainFlicker 0.5s steps(2) infinite;
    }

    @keyframes grainFlicker {
      0%, 100% { opacity: 0.12; }
      50% { opacity: 0.18; }
    }
  </style>
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <filter id="grunge" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <filter id="roughEdge" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4"/>
    </filter>

    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="fadeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="50%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1f1f1f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect class="bg-pulse" width="1920" height="1080" fill="url(#fadeGrad)"/>

  <g filter="url(#grunge)">

    <!-- Primary organic flow -->
    <path class="flow-primary" d="M-50 540
             Q 120 320, 280 480
             C 380 580, 420 280, 520 400
             S 680 620, 780 380
             C 880 180, 920 520, 1050 340
             Q 1180 160, 1280 420
             C 1380 680, 1480 220, 1580 480
             S 1720 680, 1850 400
             Q 1970 120, 2000 540"
          fill="none" stroke="#e8e8e8" stroke-width="3" opacity="0.9" filter="url(#glow)"/>

    <!-- Secondary wave -->
    <path class="flow-secondary" d="M-80 620
             C 80 820, 180 380, 340 580
             Q 500 780, 620 520
             C 740 260, 820 720, 980 480
             S 1180 180, 1320 540
             C 1460 900, 1540 320, 1720 620
             Q 1900 920, 2000 580"
          fill="none" stroke="#c0c0c0" stroke-width="2.5" opacity="0.7"/>

    <!-- Organic blobs -->
    <path class="blob" d="M320 280
             Q 380 180, 480 220
             C 580 260, 620 380, 540 480
             Q 460 580, 360 520
             C 260 460, 240 340, 320 280"
          fill="#2a2a2a" stroke="#d0d0d0" stroke-width="1.5" filter="url(#roughEdge)"/>

    <path class="blob-2" d="M1420 720
             Q 1520 620, 1620 700
             C 1720 780, 1680 920, 1560 940
             Q 1440 960, 1380 860
             C 1320 760, 1340 800, 1420 720"
          fill="#1f1f1f" stroke="#b8b8b8" stroke-width="1.5" filter="url(#roughEdge)"/>

    <!-- Tendrils -->
    <path class="tendril" d="M150 180
             C 220 280, 180 420, 280 480
             Q 380 540, 320 680
             C 260 820, 380 920, 420 980"
          fill="none" stroke="#a0a0a0" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

    <path class="tendril-2" d="M1750 80
             C 1680 180, 1720 340, 1620 420
             Q 1520 500, 1580 640
             C 1640 780, 1520 880, 1480 1000"
          fill="none" stroke="#909090" stroke-width="3.5" stroke-linecap="round" opacity="0.75"/>

    <!-- Cellular structures -->
    <path class="cell" d="M680 120
             Q 780 80, 860 160
             C 940 240, 920 380, 820 420
             Q 720 460, 660 360
             C 600 260, 600 160, 680 120"
          fill="none" stroke="#d8d8d8" stroke-width="2" opacity="0.85"/>

    <path class="cell-2" d="M1080 680
             Q 1180 620, 1280 720
             C 1380 820, 1320 960, 1180 980
             Q 1040 1000, 1000 880
             C 960 760, 980 720, 1080 680"
          fill="#252525" stroke="#c8c8c8" stroke-width="1.8"/>

    <!-- Root branches -->
    <g class="roots" stroke="#888888" fill="none" stroke-linecap="round">
      <path d="M0 920 Q 80 840, 180 880 C 280 920, 340 820, 420 860" stroke-width="5"/>
      <path d="M180 880 Q 220 780, 280 720 C 340 660, 320 580, 380 520" stroke-width="3"/>
      <path d="M280 720 Q 360 680, 420 740" stroke-width="2"/>
      <path d="M420 860 Q 520 820, 580 900 C 640 980, 720 920, 820 980" stroke-width="4"/>
    </g>

    <g class="roots-2" stroke="#787878" fill="none" stroke-linecap="round" transform="translate(1200, -100)">
      <path d="M720 180 Q 640 260, 680 360 C 720 460, 640 540, 580 620" stroke-width="4.5"/>
      <path d="M680 360 Q 760 400, 820 340 C 880 280, 920 360, 980 320" stroke-width="3"/>
      <path d="M580 620 Q 520 700, 560 780 C 600 860, 520 920, 480 1000" stroke-width="3.5"/>
    </g>

    <!-- Vein structures -->
    <path class="vein" d="M960 0
             C 920 120, 1020 180, 980 280
             Q 940 380, 1000 480
             C 1060 580, 980 680, 1020 780
             Q 1060 880, 1000 980
             C 940 1080, 1020 1120, 980 1200"
          fill="none" stroke="#707070" stroke-width="6" stroke-dasharray="20 10"/>

    <path d="M980 280 Q 1080 320, 1140 280 C 1200 240, 1280 300, 1340 260"
          fill="none" stroke="#686868" stroke-width="2.5" opacity="0.7"/>
    <path d="M1000 480 Q 900 520, 860 600 C 820 680, 740 720, 680 780"
          fill="none" stroke="#606060" stroke-width="2" opacity="0.65"/>

    <!-- Floating particles -->
    <ellipse class="particle particle-1" cx="520" cy="180" rx="25" ry="35" fill="#333" stroke="#aaa" stroke-width="1"
             transform="rotate(-20 520 180)"/>
    <ellipse class="particle particle-2" cx="1380" cy="280" rx="30" ry="20" fill="#2d2d2d" stroke="#999" stroke-width="1"
             transform="rotate(15 1380 280)"/>
    <ellipse class="particle particle-3" cx="240" cy="680" rx="18" ry="28" fill="#383838" stroke="#b0b0b0" stroke-width="1"
             transform="rotate(-35 240 680)"/>
    <ellipse class="particle particle-4" cx="1680" cy="480" rx="22" ry="32" fill="#303030" stroke="#a8a8a8" stroke-width="1"
             transform="rotate(25 1680 480)"/>
    <ellipse class="particle particle-5" cx="880" cy="920" rx="28" ry="18" fill="#2b2b2b" stroke="#9a9a9a" stroke-width="1"
             transform="rotate(-10 880 920)"/>

    <!-- Mycelium -->
    <g class="mycelium" stroke="#585858" fill="none" stroke-linecap="round">
      <path d="M0 400 Q 100 350, 160 420 C 220 490, 180 580, 260 620" stroke-width="1.5"/>
      <path d="M160 420 Q 200 380, 280 360" stroke-width="1"/>
      <path d="M260 620 Q 340 600, 380 680 C 420 760, 380 840, 440 900" stroke-width="1.2"/>
    </g>

    <g class="mycelium-2" stroke="#505050" fill="none" stroke-linecap="round" transform="translate(1400, 0)">
      <path d="M0 300 Q 80 380, 60 480 C 40 580, 120 640, 80 740" stroke-width="1.5"/>
      <path d="M60 480 Q 140 500, 200 460" stroke-width="1"/>
      <path d="M80 740 Q 160 800, 140 900" stroke-width="1.2"/>
    </g>

    <!-- Sweeps -->
    <path class="sweep" d="M-100 1080
             Q 200 880, 480 940
             C 760 1000, 960 820, 1200 920
             Q 1440 1020, 1680 880
             C 1920 740, 2020 920, 2100 1080"
          fill="none" stroke="#e0e0e0" stroke-width="2" opacity="0.4"/>

    <path class="sweep-top" d="M-100 0
             Q 180 180, 420 80
             C 660 -20, 860 200, 1100 100
             Q 1340 0, 1580 160
             C 1820 320, 2000 80, 2100 0"
          fill="none" stroke="#d0d0d0" stroke-width="1.8" opacity="0.35"/>

    <!-- Background shapes -->
    <path class="blob" d="M1800 580
             Q 1860 520, 1880 600
             C 1900 680, 1840 740, 1780 700
             Q 1720 660, 1760 600
             C 1800 540, 1780 560, 1800 580"
          fill="#222" stroke="#666" stroke-width="1" opacity="0.6"/>

    <path class="blob-2" d="M80 820
             Q 140 780, 180 840
             C 220 900, 160 960, 100 920
             Q 40 880, 60 830
             C 80 780, 70 810, 80 820"
          fill="#262626" stroke="#5a5a5a" stroke-width="1" opacity="0.55"/>

  </g>

  <!-- Grain overlay -->
  <rect class="grain" width="1920" height="1080" filter="url(#grain)" opacity="0.15"/>

</svg>

</body>
</html>
